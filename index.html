<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Econômico Delivery — Retaguarda</title>
  <meta name="theme-color" content="#FFC600"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--y:#FFC600;--bg:#f5f5f5;--card:#fff;--border:#e8e8e8;--text:#1a1a1a;--text2:#888;--red:#e74c3c;--green:#2d9e62}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}

    /* ── HEADER BRANCO + FAIXA AMARELA ── */
    .top-accent{height:6px;background:var(--y)}
    .top-bar{background:#fff;padding:28px 24px 68px;text-align:center;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .top-bar-logo{width:120px;height:120px;display:block;margin:0 auto 12px;object-fit:contain}
    .top-bar-nome{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#111;letter-spacing:-.3px}
    .top-bar-badge{display:inline-block;background:var(--y);color:#000;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-top:8px}

    /* ── CONTAINER ── */
    .container{max-width:420px;margin:-36px auto 0;padding:0 16px calc(32px + env(safe-area-inset-bottom));position:relative;z-index:1}

    /* ── LOGIN ── */
    #login-screen{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
    .login-card{background:var(--card);border-radius:20px;box-shadow:0 4px 28px rgba(0,0,0,.10);padding:28px 24px}
    .login-label{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:16px;text-align:center;letter-spacing:.2px}
    .login-input{width:100%;background:#f9f9f9;border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .2s}
    .login-input:focus{border-color:var(--y);background:#fff}
    .login-btn{width:100%;padding:14px;border-radius:10px;background:var(--y);border:none;color:#000;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .2s}
    .login-btn:active{opacity:.85}
    .login-btn:disabled{opacity:.5;cursor:not-allowed}
    .login-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px;font-weight:600;text-align:center}

    /* ── APP ── */
    #app-screen{display:none;flex-direction:column;min-height:100vh;background:var(--bg)}

    /* ── USER BAR ── */
    .user-bar{background:var(--card);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .user-bar-nome{font-size:14px;font-weight:800;color:var(--text)}
    .user-bar-perfil{font-size:11px;color:var(--text2);margin-top:2px}
    .btn-logout{background:none;border:1.5px solid var(--border);color:#999;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn-logout:active{border-color:#999;color:#333}

    /* ── CARDS ── */
    .cards{display:flex;flex-direction:column;gap:10px}
    .app-card{display:flex;align-items:center;gap:16px;background:var(--card);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:18px 20px;text-decoration:none;color:var(--text);transition:box-shadow .2s,transform .15s;border:1.5px solid transparent}
    .app-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.11);transform:translateY(-1px)}
    .app-card:active{transform:scale(.98);box-shadow:0 1px 6px rgba(0,0,0,.08);border-color:var(--y)}
    .app-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
    .app-icon.admin    {background:#eff6ff;border:1.5px solid #bfdbfe}
    .app-icon.expedicao{background:#f0fdf4;border:1.5px solid #bbf7d0}
    .app-icon.entregador{background:#fffbeb;border:1.5px solid #fde68a}
    .app-info{flex:1;min-width:0}
    .app-title{font-size:15px;font-weight:800;color:var(--text)}
    .app-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
    .app-arrow{font-size:20px;color:#bbb;flex-shrink:0;font-weight:700}

    .no-access{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}

    .footer{margin-top:32px;text-align:center;font-size:11px;color:#bbb;font-weight:600;letter-spacing:.3px}
    .footer span{color:#999}
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="top-accent"></div>
  <div class="top-bar">
    <img class="top-bar-logo" src="https://fc360oficial.github.io/economicodelivery/logo.png"
      onerror="this.style.background='#000';this.style.display='flex';this.outerHTML='<div style=\'width:80px;height:80px;border-radius:20px;background:#000;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px\'>🛒</div>'"
      alt="Logo">
    <div class="top-bar-nome">Econômico Delivery</div>
    <div class="top-bar-badge">Retaguarda</div>
  </div>
  <div class="container">
    <div class="login-card">
      <div class="login-label">Acesso restrito à equipe</div>
      <form id="login-form" onsubmit="event.preventDefault();doLogin()" autocomplete="on">
        <input class="login-input" type="text" id="inp-usuario" name="username" placeholder="Usuário" autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('inp-senha').focus()">
        <input class="login-input" type="password" id="inp-senha" name="password" placeholder="Senha" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-btn" id="btn-entrar" type="submit">Entrar</button>
      </form>
      <div class="login-err" id="login-err"></div>
    </div>
    <div class="footer" style="margin-top:24px">Desenvolvido por <span>Fluxo Certo 360</span></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-screen">
  <div class="top-accent"></div>
  <div class="top-bar">
    <img class="top-bar-logo" src="https://fc360oficial.github.io/economicodelivery/logo.png"
      onerror="this.style.display='none'" alt="Logo">
    <div class="top-bar-nome">Econômico Delivery</div>
    <div class="top-bar-badge">Retaguarda</div>
  </div>
  <div class="container">
    <div class="user-bar">
      <div>
        <div class="user-bar-nome" id="user-nome">—</div>
        <div class="user-bar-perfil" id="user-perfil">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
    <div class="cards" id="cards-container"></div>
    <div class="footer">Desenvolvido por <span>Fluxo Certo 360</span></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCfUZxP0gNPVOAdUsGuoRNSQlfbEsNMUCA",
    authDomain: "economico-delivery.firebaseapp.com",
    projectId: "economico-delivery",
    storageBucket: "economico-delivery.appspot.com",
    messagingSenderId: "561359988054",
    appId: "1:561359988054:web:5a4c17f2ced6150ccae2f7"
  });
  var db = firebase.firestore();

  var SESSION_KEY = 'ec_hub_session';
  var SESSION_TTL = 12 * 60 * 60 * 1000; // 12h

  var PERFIL_LABEL = {
    admin:      'Administrador',
    expedicao:  'Expedição',
    entregador: 'Entregador',
  };

  function getSession() {
    try {
      var s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
      if (!s) return null;
      if (Date.now() - s.timestamp > SESSION_TTL) { sessionStorage.removeItem(SESSION_KEY); return null; }
      return s;
    } catch(e) { return null; }
  }

  function doLogin() {
    var usuario = document.getElementById('inp-usuario').value.trim().toLowerCase();
    var senha   = document.getElementById('inp-senha').value;
    var btn     = document.getElementById('btn-entrar');
    var errEl   = document.getElementById('login-err');
    errEl.textContent = '';
    if (!usuario || !senha) { errEl.textContent = 'Preencha usuário e senha.'; return; }
    btn.disabled = true; btn.textContent = '⏳';

    db.collection('usuarios').where('usuario', '==', usuario).where('ativo', '==', true).get()
      .then(function(snap) {
        if (snap.empty) { errEl.textContent = 'Usuário não encontrado.'; btn.disabled=false; btn.textContent='Entrar'; return; }
        var doc = snap.docs[0], d = doc.data();
        if (d.senha !== senha) { errEl.textContent = 'Senha incorreta.'; btn.disabled=false; btn.textContent='Entrar'; return; }
        var session = { uid: doc.id, nome: d.nome, usuario: d.usuario, perfis: d.perfis || [], timestamp: Date.now() };
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
        showApp(session);
      })
      .catch(function(e) { errEl.textContent = 'Erro de conexão.'; btn.disabled=false; btn.textContent='Entrar'; });
  }

  function showApp(session) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    document.getElementById('user-nome').textContent    = session.nome;
    var perfisLabels = (session.perfis||[]).map(function(p){ return PERFIL_LABEL[p]||p; }).join(' · ');
    document.getElementById('user-perfil').textContent = perfisLabels || 'Sem perfil';

    var APPS = [
      { id:'admin',      icon:'🏪', title:'Painel Admin',     desc:'Pedidos, produtos, categorias e configurações', url:'https://fc360oficial.github.io/economico-admin?hub=1'     },
      { id:'expedicao',  icon:'📦', title:'Expedição',        desc:'Separação de pedidos, confirmação de saída e retiradas', url:'https://fc360oficial.github.io/economico-expedicao?hub=1' },
      { id:'entregador', icon:'🛵', title:'Entregador',       desc:'Rotas, confirmação de entrega e histórico do dia',       url:'https://fc360oficial.github.io/economico-entregador?hub=1'},
    ];

    var perfis = session.perfis || [];
    var html = '';
    APPS.forEach(function(a) {
      if (perfis.indexOf(a.id) < 0) return;
      html += '<a class="app-card" href="'+a.url+'" target="_self">'
        + '<div class="app-icon '+a.id+'">'+a.icon+'</div>'
        + '<div class="app-info"><div class="app-title">'+a.title+'</div><div class="app-desc">'+a.desc+'</div></div>'
        + '<div class="app-arrow">›</div>'
        + '</a>';
    });

    if (!html) html = '<div class="no-access">Nenhum app disponível para seu perfil.<br>Fale com o administrador.</div>';
    document.getElementById('cards-container').innerHTML = html;
  }

  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('app-screen').style.display   = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('inp-usuario').value = '';
    document.getElementById('inp-senha').value   = '';
    document.getElementById('btn-entrar').disabled = false;
    document.getElementById('btn-entrar').textContent = 'Entrar';
  }

  // Verificar sessão ao carregar
  var _session = getSession();
  if (_session) {
    showApp(_session);
  }
</script>
</body>
</html>
